# English translations for commands
command.pwd.name=Print working directory
command.pwd.description=Shows the absolute path of the current working directory.
command.pwd.signature=pwd

command.touch.name=Create empty file(s)
command.touch.description=Creates one or more empty files; if a file exists its timestamp is updated.
command.touch.signature=touch FILE...

command.mkdir.name=Create directory
command.mkdir.description=Creates one or more directories.
command.mkdir.signature=mkdir DIRECTORY...

command.cd.name=Change directory
command.cd.description=Change the working directory to the specified path.
command.cd.signature=cd [DIRECTORY]

command.rm.name=Remove file(s)
command.rm.description=Deletes one or more files.
command.rm.signature=rm FILE...

command.rmdir.name=Remove empty directory
command.rmdir.description=Removes a directory only if it is empty.
command.rmdir.signature=rmdir DIRECTORY...

command.mv.name=Move or rename
command.mv.description=Moves files or directories, or renames them.
command.mv.signature=mv SOURCE DESTINATION

command.ln.name=Create link
command.ln.description=Creates a hard link or, with -s, a symbolic link to a target.
command.ln.signature=ln [-s] TARGET LINK_NAME

command.ls.name=List directory
command.ls.description=Lists files and directories; use -i to include inode information.
command.ls.signature=ls [-i] FILE...

command.clear.name=Clear output
command.clear.description=Clears the output display area.
command.clear.signature=clear

command.help.name=Show help
command.help.description=Displays a summary of available commands with their usage.
command.help.signature=help

