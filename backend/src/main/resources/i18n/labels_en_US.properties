label.helpIntroduction=The file system is divided into 3 parts:\u000A\u000A\u000A1. Command Input \u2013 This is the area where the user enters commands to interact with the system, for example to create, read, modify, or delete files and directories.\u000A\u000A2. Output \u2013 Displays the results of the command execution, such as the list of files, the details of a specific file, or any error messages.\u000A\u000A3. User Feedback \u2013 Provides the user with confirmations or notifications about the status of operations, indicating whether a command was executed successfully or if problems occurred (e.g. \u201CFile created successfully\u201D or \u201CPermission denied\u201D).

